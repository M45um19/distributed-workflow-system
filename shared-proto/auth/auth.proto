syntax = "proto3";

package auth;

option go_package = "./pb";

service AuthService {
  rpc VerifySession (VerifyRequest) returns (VerifyResponse);
}

message VerifyRequest {
  string token = 1;
}

message VerifyResponse {
  bool isValid = 1;
  string userId = 2;
  string role = 3;
  string email = 4;
  string deviceId = 5;
  string ip = 6;
  string deviceName = 7;
}