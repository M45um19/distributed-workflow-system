version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: taskflow-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=taskflow-auth

  postgres:
    image: postgres:15-alpine
    container_name: taskflow-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=taskflow_jobs
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis-auth:
    image: redis:7-alpine
    container_name: taskflow-redis-auth
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-task:
    image: redis:7-alpine
    container_name: taskflow-redis-task
    ports:
      - "6381:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-notification:
    image: redis:7-alpine
    container_name: taskflow-redis-notification
    ports:
      - "6382:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-insight:
    image: redis/redisinsight:latest
    container_name: taskflow-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis-auth
      - redis-task
      - redis-notification

volumes:
  mongo-data:
  postgres-data: