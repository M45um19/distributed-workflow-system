services:
  mongodb:
    image: mongo:latest
    container_name: taskflow-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=taskflow-auth

  postgres:
    image: postgres:15-alpine
    container_name: taskflow-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=taskflow_jobs
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis-auth:
    image: redis:7-alpine
    container_name: taskflow-redis-auth
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-task:
    image: redis:7-alpine
    container_name: taskflow-redis-task
    ports:
      - "6381:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-notification:
    image: redis:7-alpine
    container_name: taskflow-redis-notification
    ports:
      - "6382:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-insight:
    image: redis/redisinsight:latest
    container_name: taskflow-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis-auth
      - redis-task
      - redis-notification

  kafka:
    image: apache/kafka:latest
    container_name: taskflow-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taskflow-kafka-ui
    ports:
      - "8010:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9094
    depends_on:
      - kafka

volumes:
  mongo-data:
  postgres-data:
  kafka-data: