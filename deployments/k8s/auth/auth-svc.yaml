apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/api/v1/auth/metrics"
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 50051
          name: grpc
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/auth/live 
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/auth/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: NODE_ENV
          value: "production"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://monitoring-opentelemetry-collector:4317"
        - name: SERVICE_NAME
          value: "auth-service"
        - name: PORT
          value: "5000"
        - name: KAFKA_BROKERS
          value: "host.docker.internal:9092"
        - name: AUTH_PROTO_PATH
          value: "/shared-proto/auth/auth.proto"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: MONGO_URI
        - name: REDIS_URI
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: REDIS_URI
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: JWT_ACCESS_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: JWT_REFRESH_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
    - name: grpc
      protocol: TCP
      port: 50051
      targetPort: 50051